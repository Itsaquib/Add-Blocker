<!DOCTYPE html>
<html>
  <head>
    <title>Unwanted Add's Blocker</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 12px;
        width: 200px;
      }
      .toggle-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 24px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 24px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #4caf50;
      }
      input:checked + .slider:before {
        transform: translateX(26px);
      }
    </style>
  </head>
  <body>
  <h3>Add's Blocker</h3>
  <div class="toggle-container">
    <span>Status:</span>
    <label class="switch">
      <input type="checkbox" id="toggle-ext">
      <span class="slider"></span>
    </label>
  </div>
  <p id="status-text" style="margin-top: 10px; font-size: 14px;"></p>

  <script src="popup.js"></script>
</body>
</html>
